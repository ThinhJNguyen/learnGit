<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table html</title>
</head>
<body>
    <h1>Bảng sản phẩm</h1>

    <table>
        <thead>
            <tr>
               <th>Tên sản phẩm</th>
               <th>Giá</th>
             </tr>
        </thead>
        <tbody>
             <tr>
                <td>Áo phông</td>
                <td>100.000 VNĐ</td>
            </tr>
            <tr>
                <td>Quần jean</td>
                <td>200.000 VNĐ</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Tổng</td>
                <td>300.000 VNĐ</td>
            </tr>
        </tfoot>
       
    </table>
</body>
</html>
